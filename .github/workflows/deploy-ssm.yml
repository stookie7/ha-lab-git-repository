name: Deploy via SSM (Free Tier)

# event - main branch push event 발생시
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: ha-lab-deploy-bucket-${{ secrets.AWS_ACCOUNT_ID }}
  ASG_NAME: ha-lab-asg
  DEPLOY_DIR: /var/www/html 
  APP_VERSION: ${{ github.sha }}

  
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Inject version info
      run: |
          DEPLOY_TIME=$(date '+%Y-%m-%d %H:%M KST' -d '+9 hours')
          SHORT_SHA="${GITHUB_SHA::7}"
          sed -i "s/배포 버전: [^<]*/배포 버전: ${SHORT_SHA} (${DEPLOY_TIME})/" index.html || true

    
    # 4. S3에 배포 패키지 업로드continue-on-error: 
    - name: Upload to S3
      run: |
          zip -r deploy-${APP_VERSION}.zip . \
            --exclude "*.git*" --exclude ".github/*" --exclude "tests/*"
          aws s3 cp deploy-${APP_VERSION}.zip \
            s3://${S3_BUCKET}/releases/deploy-${APP_VERSION}.zip
          aws s3 cp deploy-${APP_VERSION}.zip \
            s3://${S3_BUCKET}/releases/deploy-latest.zip
    
    # 5. ASG InService 인스터스 ID 조회
    - name: Get ASG instance IDs
      id: get_instances
      run: |
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${ASG_NAME}" \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
            --output text | tr '\t' ' ')
          echo "instance_ids=${INSTANCE_IDS}" >> $GITHUB_OUTPUT

    # 6. SSM Run Command로 각 Ec2에 순차 배포
    - name: Deploy via SSM
      run: |
        for INSTANCE_ID in ${{ steps.get_instances.outputs.instance_ids }}; do
          echo "배포 시작: $INSTANCE_ID"
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands=["\
              aws s3 cp s3://${S3_BUCKET}/releases/deploy-${APP_VERSION}.zip /tmp/deploy.zip && \
              unzip -o /tmp/deploy.zip -d ${DEPLOY_DIR} && \
              nginx -t && systemctl reload nginx && \
              curl -sf http://localhost/health\
            "] \
            --timeout-seconds 300 \
            --query Command.CommandId --output text)
          # 완료 대기 (최대 5분)
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo Pending)
            [ "$STATUS" = "Success" ] && break
            [ "$STATUS" = "Failed" ] && exit 1
          done
          echo "✅ $INSTANCE_ID 배포 완료"
        done

    # 7. ALB 최종 응답 확인
    - name: Verify via ALB
      run: |
          curl -sf --max-time 10 http://${{ secrets.ALB_DNS }} && echo '✅ ALB 정상'

   
